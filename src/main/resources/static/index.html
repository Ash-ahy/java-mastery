<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Java Mastery Pro</title>
<style>
:root{--bg:#1e1e2f;--card:#27293d;--border:#2b3553;--text:#fff;--muted:hsla(0,0%,100%,.5);--accent:#1d8cf8;--green:#00f2c3;--red:#fd5e70;--orange:#ff8d3c}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#app{display:flex;min-height:100vh}
.sidebar{width:260px;background:linear-gradient(180deg,#1e1e2f,#27293d);position:fixed;top:0;left:0;bottom:0;z-index:100;display:none;flex-direction:column;padding:20px 0;border-right:1px solid var(--border);overflow-y:auto}
.sidebar .logo{padding:0 20px 20px;color:var(--accent);font-size:18px;font-weight:600;border-bottom:1px solid var(--border);margin-bottom:10px}
.sidebar a{display:flex;align-items:center;gap:10px;padding:12px 20px;color:var(--muted);text-decoration:none;font-size:14px;cursor:pointer;transition:.2s}
.sidebar a:hover,.sidebar a.active{background:var(--card);color:#fff}
.main{flex:1;min-width:0;padding:24px}
.main.with-sidebar{margin-left:260px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;overflow:hidden}
.card h3{color:var(--accent);margin-bottom:16px;font-size:16px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}
.stat{background:linear-gradient(135deg,var(--card),#1e1e2f);border-radius:12px;padding:20px;text-align:center}
.stat .num{font-size:28px;font-weight:700}
.stat .label{color:var(--muted);font-size:13px;margin-top:4px}
.charts{display:grid;grid-template-columns:minmax(0,2fr) minmax(280px,1fr);gap:20px}
.btn{padding:8px 16px;border:none;border-radius:20px;cursor:pointer;font-size:13px;font-weight:500}
.btn:disabled{opacity:.65;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}.btn-green{background:var(--green);color:#1e1e2f}.btn-red{background:var(--red);color:#fff}.btn-gray{background:var(--border);color:#fff}
.btn-sm{padding:4px 12px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top;word-break:break-word}
th{color:var(--muted);font-weight:600;background:var(--bg)}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-green{background:rgba(0,242,195,.15);color:var(--green)}.tag-red{background:rgba(253,94,112,.15);color:var(--red)}.tag-yellow{background:rgba(255,141,60,.15);color:var(--orange)}.tag-blue{background:rgba(29,140,242,.15);color:var(--accent)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;padding:24px;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:var(--card);border-radius:16px;padding:30px;width:min(500px,100%);max-height:85vh;overflow-y:auto}
.modal-box h3{margin-bottom:20px;color:var(--accent)}
.modal-box label{display:block;margin-bottom:4px;font-size:12px;color:var(--muted);text-transform:uppercase}
.modal-box input,.modal-box select{width:100%;padding:10px 14px;margin-bottom:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px}
.btns{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap}
.login-wrap{width:min(420px,100%);margin:0 auto}
.login-wrap input{width:100%;padding:14px;margin-bottom:14px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:#fff;font-size:15px}
.login-wrap button{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.err{color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px}
.page{display:none}
.page.active{display:block}
#page-login{min-height:calc(100vh - 48px);align-items:center;justify-content:center}
#page-login.active{display:flex}
@media (max-width:1100px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.charts{grid-template-columns:1fr}}
@media (max-width:820px){.sidebar{position:static;width:100%;height:auto}.main.with-sidebar{margin-left:0}.main{padding:16px}.stats{grid-template-columns:1fr}.card{padding:16px}table{display:block;overflow-x:auto;white-space:nowrap}#page-login{min-height:100vh}}
</style>
</head>
<body>
<div id="app">
  <div class="sidebar" id="sidebar-el">
    <div class="logo">☕ Java Mastery Pro</div>
    <a class="active" onclick="nav('dashboard')">📊 数据大盘</a>
    <a onclick="nav('products')">📦 商品管理</a>
    <a onclick="nav('orders')">📋 订单管理</a>
    <a onclick="nav('users')">👥 用户管理</a>
    <a onclick="nav('cart')">🛒 购物车</a>
    <a onclick="nav('api')">🔧 API调试</a>
    <div style="position:absolute;bottom:30px;left:20px;right:20px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">👤 <span id="uname"></span></div>
      <button class="btn btn-red btn-sm" style="width:100%" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="main" id="main-el">
    <div id="page-login" class="page active">
      <div class="card login-wrap">
        <h3 style="text-align:center;font-size:22px">🔐 登录管理后台</h3>
        <input id="lu" placeholder="用户名" value="admin">
        <input id="lp" type="password" placeholder="密码" value="admin123">
        <button id="login-btn">登 录</button>
        <div id="lerr" class="err"></div>
        <div style="margin-top:16px;text-align:center;font-size:12px;color:var(--muted)">admin/admin123 · zhangsan/admin123 · lisi/admin123</div>
      </div>
    </div>

    <div id="page-dashboard" class="page"><div class="stats" id="stats"></div><div class="charts"><div class="card"><h3>📈 近7天订单趋势</h3><div id="chart1" style="height:300px"></div></div><div class="card"><h3>🍩 订单状态分布</h3><div id="chart2" style="height:300px"></div></div></div></div>

    <div id="page-products" class="page"><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="margin:0">📦 商品管理</h3><div style="display:flex;gap:8px"><input id="ps" placeholder="搜索..." style="padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:#fff;width:200px" oninput="loadProducts()"><button class="btn btn-primary btn-sm" onclick="openProductModal()">+ 新增</button></div></div><table><thead><tr><th>ID</th><th>名称</th><th>分类</th><th>价格</th><th>库存</th><th>状态</th><th>操作</th></tr></thead><tbody id="pt"></tbody></table></div></div>

    <div id="page-orders" class="page"><div class="card"><h3>📋 订单管理</h3><div style="display:flex;gap:6px;margin-bottom:12px"><button class="btn btn-primary btn-sm" onclick="loadOrders('')">全部</button><button class="btn btn-gray btn-sm" onclick="loadOrders('PENDING')">待支付</button><button class="btn btn-gray btn-sm" onclick="loadOrders('PAID')">已支付</button><button class="btn btn-gray btn-sm" onclick="loadOrders('CANCELLED')">已取消</button></div><table><thead><tr><th>订单号</th><th>金额</th><th>状态</th><th>收货信息</th><th>时间</th><th>操作</th></tr></thead><tbody id="ot"></tbody></table></div></div>

    <div id="page-users" class="page"><div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><h3 style="margin:0">👥 用户管理</h3><button class="btn btn-primary btn-sm" onclick="openUserModal()">+ 新增用户</button></div><table><thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>手机</th><th>角色</th><th>状态</th><th>操作</th></tr></thead><tbody id="ut"></tbody></table></div></div>

    <div id="page-cart" class="page"><div class="card"><h3>🛒 我的购物车</h3><div id="cartList"></div></div></div>

    <div id="page-api" class="page"><div class="card"><h3>🔧 API 调试</h3><div style="display:flex;gap:8px;margin-bottom:12px"><select id="am" style="padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:#fff;width:100px"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option></select><input id="au" style="flex:1;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:#fff" value="/api/product"><button class="btn btn-primary btn-sm" onclick="callApi()">发送</button></div><pre id="ar" style="background:var(--bg);padding:16px;border-radius:8px;max-height:400px;overflow:auto;font-size:12px;color:var(--green)">点击发送查看响应</pre></div></div>
  </div>
</div>

<div class="modal" id="pm"><div class="modal-box"><h3 id="pmTitle">新增商品</h3><input type="hidden" id="pid"><label>名称</label><input id="pn"><label>价格</label><input id="pp" type="number" step="0.01"><label>库存</label><input id="ps2" type="number"><label>分类</label><select id="pc" style="background:var(--bg);border-color:var(--border);color:#fff"><option value="2">手机</option><option value="3">电脑</option><option value="1">电子</option></select><div class="btns"><button class="btn btn-gray btn-sm" onclick="closeModal('pm')">取消</button><button class="btn btn-primary btn-sm" onclick="saveProduct()">保存</button></div></div></div>

<div class="modal" id="um"><div class="modal-box"><h3>新增用户</h3><label>用户名</label><input id="uun"><label>密码</label><input id="upw" type="password"><label>昵称</label><input id="uni"><label>手机</label><input id="uph"><label>邮箱</label><input id="uem"><div class="btns"><button class="btn btn-gray btn-sm" onclick="closeModal('um')">取消</button><button class="btn btn-primary btn-sm" onclick="saveUser()">保存</button></div></div></div>

<div class="modal" id="rm"><div class="modal-box"><h3>📦 收货信息</h3><input type="hidden" id="rm_items"><label>收货人</label><input id="rrn" placeholder="姓名"><label>手机号</label><input id="rrp" placeholder="手机号"><label>地址</label><input id="rra" placeholder="详细地址"><div class="btns"><button class="btn btn-gray btn-sm" onclick="closeModal('rm')">取消</button><button class="btn btn-primary btn-sm" onclick="placeOrder()">确认下单</button></div></div></div>

<script>
var A='/api',T=localStorage.getItem('t')||'',U=JSON.parse(localStorage.getItem('u')||'null');
var ORDER_ITEMS={},CART_DATA=[];

function byId(id){return document.getElementById(id)}
function showAuthedUI(username){
  byId('uname').textContent=username||'admin';
  byId('sidebar-el').style.display='flex';
  byId('main-el').classList.add('with-sidebar');
}
function hideAuthedUI(){
  byId('sidebar-el').style.display='none';
  byId('main-el').classList.remove('with-sidebar');
}

function api(url,opt){
  opt=opt||{};var h={'Content-Type':'application/json'};
  if(T)h['Authorization']='Bearer '+T;
  return fetch(A+url,{headers:h,method:opt.method||'GET',body:opt.body}).then(function(r){
    if(!r.ok){var ct=r.headers.get('content-type')||'';return ct.indexOf('json')!==-1?r.json():{code:r.status,message:'请求失败('+r.status+')'}}
    return r.json();
  }).catch(function(e){return{code:500,message:e.message}});
}

function doLogin(){
  var u=byId('lu').value,p=byId('lp').value,btn=byId('login-btn');
  if(!u||!p){byId('lerr').textContent='请输入用户名和密码';return}
  byId('lerr').textContent='登录中...';
  btn.disabled=true;
  btn.textContent='登录中...';
  api('/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})}).then(function(d){
    if(d.code===200){
      T=d.data.token;
      U=d.data;
      localStorage.setItem('t',T);
      localStorage.setItem('u',JSON.stringify(d.data));
      byId('lerr').textContent='';
      showAuthedUI(d.data.username);
      btn.disabled=false;
      btn.textContent='登 录';
      window.location.reload();
    }else{
      byId('lerr').textContent=d.message||'登录失败';
      btn.disabled=false;
      btn.textContent='登 录';
    }
  }).catch(function(e){
    byId('lerr').textContent=e.message||'登录失败';
    btn.disabled=false;
    btn.textContent='登 录';
  });
}

function logout(){T='';U=null;localStorage.removeItem('t');localStorage.removeItem('u');hideAuthedUI();byId('login-btn').disabled=false;byId('login-btn').textContent='登 录';nav('login')}

function nav(n){
  var ps=document.querySelectorAll('.page');for(var i=0;i<ps.length;i++)ps[i].classList.remove('active');
  byId('page-'+n).classList.add('active');
  var as=document.querySelectorAll('.sidebar a'),map={dashboard:'数据大盘',products:'商品管理',orders:'订单管理',users:'用户管理',cart:'购物车',api:'API调试'};
  for(var j=0;j<as.length;j++){as[j].classList.remove('active');if(as[j].textContent.indexOf(map[n])!==-1)as[j].classList.add('active')}
  if(n==='dashboard'){loadStats();loadCharts()}else if(n==='products')loadProducts();else if(n==='orders')loadOrders('');else if(n==='users')loadUsers();else if(n==='cart')loadCart();
}

function closeModal(id){byId(id).classList.remove('show')}

function loadStats(){
  api('/product').then(function(d){var p=d.data?d.data.total:0;api('/order/statistics').then(function(s){var td=s.data?Math.round(s.data.todayTurnover||0):0;
    byId('stats').innerHTML='<div class="stat"><div class="num" style="color:#1d8cf8">'+p+'</div><div class="label">商品总数</div></div><div class="stat"><div class="num" style="color:#00f2c3">¥'+td.toLocaleString()+'</div><div class="label">今日交易额</div></div><div class="stat"><div class="num" style="color:#ff8d3c">'+(p>0?Math.floor(Math.random()*3000+500):0)+'</div><div class="label">今日PV</div></div><div class="stat"><div class="num" style="color:#fd5e70">'+(p>0?Math.floor(Math.random()*800+100):0)+'</div><div class="label">今日UV</div></div>'})})}

function loadCharts(){if(typeof echarts==='undefined'){byId('chart1').innerHTML='<div style="height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted)">图表组件未加载，已切换为离线模式</div>';byId('chart2').innerHTML='<div style="height:300px;display:flex;align-items:center;justify-content:center;color:var(--muted)">图表组件未加载，已切换为离线模式</div>';return}setTimeout(function(){var c1=echarts.init(byId('chart1')),c2=echarts.init(byId('chart2'));
  c1.setOption({tooltip:{},xAxis:{data:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],axisLabel:{color:'hsla(0,0%,100%,.5)'}},yAxis:{axisLabel:{color:'hsla(0,0%,100%,.5)'}},series:[{data:[120,200,150,80,70,110,130],type:'line',smooth:true,itemStyle:{color:'#1d8cf8'},areaStyle:{color:'rgba(29,140,242,.15)'}}]});
  c2.setOption({tooltip:{},series:[{type:'pie',radius:['40%','70%'],data:[{value:45,name:'已支付',itemStyle:{color:'#00f2c3'}},{value:20,name:'待支付',itemStyle:{color:'#ff8d3c'}},{value:10,name:'已取消',itemStyle:{color:'#fd5e70'}},{value:25,name:'已完成',itemStyle:{color:'#1d8cf8'}}],label:{color:'#fff'}}]})},500)}

function loadProducts(){var kw=byId('ps')?byId('ps').value:'';api('/product'+(kw?'?keyword='+kw:'')).then(function(d){if(d.code!==200)return;var html='';(d.data.records||[]).forEach(function(p){var cat=p.categoryId===2?'手机':p.categoryId===3?'电脑':'电子',stockTag=p.stock>0?'<span class="tag tag-green">有货</span>':'<span class="tag tag-red">缺货</span>',btns='';if(p.stock>0){btns+='<button class="btn btn-primary btn-sm" onclick="addToCart('+p.id+')">🛒</button> <button class="btn btn-green btn-sm" onclick="buyNow('+p.id+')">⚡</button> '}if(T)btns+='<button class="btn btn-red btn-sm" onclick="delProduct('+p.id+')">删除</button>';html+='<tr><td>'+p.id+'</td><td>'+p.name+'</td><td>'+cat+'</td><td>¥'+p.price+'</td><td>'+p.stock+'</td><td>'+stockTag+'</td><td style="display:flex;gap:4px">'+btns+'</td></tr>'});byId('pt').innerHTML=html})}

function addToCart(pid){api('/cart',{method:'POST',body:JSON.stringify({productId:pid,quantity:1})}).then(function(r){if(r.code===200)alert('已加入购物车');else alert(r.message)})}
function buyNow(pid){openReceiverModal([{productId:pid,quantity:1}])}
function openProductModal(){byId('pid').value='';byId('pn').value='';byId('pp').value='';byId('ps2').value='';byId('pmTitle').textContent='新增商品';byId('pm').classList.add('show')}
function saveProduct(){var id=byId('pid').value,d={name:byId('pn').value,price:parseFloat(byId('pp').value),stock:parseInt(byId('ps2').value),categoryId:parseInt(byId('pc').value),status:1};if(id)api('/product/'+id,{method:'PUT',body:JSON.stringify(d)}).then(function(){closeModal('pm');loadProducts()});else api('/product',{method:'POST',body:JSON.stringify(d)}).then(function(){closeModal('pm');loadProducts()})}
function delProduct(id){if(confirm('确定删除?'))api('/product/'+id,{method:'DELETE'}).then(loadProducts)}

function loadOrders(status){var q=status?'?status='+status:'';api('/order'+q).then(function(d){if(d.code!==200)return;var tags={PENDING:'tag-yellow',PAID:'tag-green',CANCELLED:'tag-red',SHIPPING:'tag-blue',DELIVERED:'tag-green'},html='';(d.data.records||[]).forEach(function(o){var ops='';if(o.status==='PENDING')ops+='<button class="btn btn-green btn-sm" onclick="payOrder('+o.id+')">支付</button> <button class="btn btn-gray btn-sm" onclick="cancelOrder('+o.id+')">取消</button> ';ops+='<button class="btn btn-primary btn-sm" onclick="toggleItems('+o.id+')">📋</button>';html+='<tr><td style="font-family:monospace;font-size:12px">'+o.orderNo+'</td><td>¥'+(o.payAmount||0)+'</td><td><span class="tag '+tags[o.status]+'">'+o.status+'</span></td><td>'+(o.receiverName||'-')+'<br><span style="font-size:11px;color:var(--muted)">'+(o.receiverPhone||'')+' '+(o.receiverAddress||'')+'</span></td><td>'+(o.createTime||'').substring(0,16)+'</td><td style="display:flex;gap:4px">'+ops+'</td></tr>';html+='<tr id="oi_'+o.id+'" style="display:none"><td colspan="6" style="background:var(--bg);padding:8px 12px"><span style="color:var(--muted)">加载中...</span></td></tr>'});byId('ot').innerHTML=html})}

function toggleItems(oid){var row=byId('oi_'+oid);if(row.style.display!=='none'){row.style.display='none';return}row.style.display='';if(ORDER_ITEMS[oid]){row.cells[0].innerHTML=ORDER_ITEMS[oid];return}api('/order/'+oid).then(function(d){if(d.code!==200)return;var html='<table style="width:100%;font-size:12px"><thead><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th></tr></thead><tbody>';(d.data.items||[]).forEach(function(i){html+='<tr><td>'+i.productName+'</td><td>¥'+i.price+'</td><td>×'+i.quantity+'</td><td>¥'+i.totalPrice+'</td></tr>'});html+='</tbody></table>';ORDER_ITEMS[oid]=html;row.cells[0].innerHTML=html})}

function payOrder(id){api('/order/'+id+'/pay',{method:'POST'}).then(function(){loadOrders('')})}
function cancelOrder(id){api('/order/'+id+'/cancel',{method:'POST'}).then(function(){loadOrders('')})}

function loadUsers(){api('/sys/user').then(function(d){if(d.code===403){byId('ut').innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--red);padding:30px">🔒 没有权限</td></tr>';return}if(d.code!==200)return;var rows=d.data.records||[];Promise.all(rows.filter(function(u){return u.id}).map(function(u){return api('/sys/user/'+u.id+'/roles').then(function(rd){return{id:u.id,roles:(rd.data||[]).map(function(r){return r==='ROLE_ADMIN'?'管理员':r==='ROLE_USER'?'用户':r}).join(',')||'无'}})})).then(function(rolesMap){var rm={};rolesMap.forEach(function(r){rm[r.id]=r.roles});var html='';rows.forEach(function(u){html+='<tr><td>'+u.id+'</td><td>'+u.username+'</td><td>'+u.nickname+'</td><td>'+(u.phone||'-')+'</td><td>'+rm[u.id]+'</td><td><span class="tag '+(u.status===1?'tag-green':'tag-red')+'">'+(u.status===1?'正常':'禁用')+'</span></td><td>'+(u.id!==1?'<button class="btn btn-red btn-sm" onclick="delUser('+u.id+')">删除</button>':'')+'</td></tr>'});byId('ut').innerHTML=html})})}

function openUserModal(){byId('uun').value='';byId('upw').value='';byId('uni').value='';byId('uph').value='';byId('uem').value='';byId('um').classList.add('show')}
function saveUser(){var d={username:byId('uun').value,password:byId('upw').value,nickname:byId('uni').value,phone:byId('uph').value,email:byId('uem').value};api('/sys/user',{method:'POST',body:JSON.stringify(d)}).then(function(r){if(r.code===200){closeModal('um');loadUsers()}else if(r.code===403)alert('🔒 没有权限');else alert(r.message)})}
function delUser(id){if(confirm('确定删除?'))api('/sys/user/'+id,{method:'DELETE'}).then(loadUsers)}

function loadCart(){api('/cart').then(function(d){if(d.code!==200||!d.data.length){byId('cartList').innerHTML='<p style="color:var(--muted);padding:16px;text-align:center">🛒 购物车为空</p>';return}CART_DATA=d.data;var ids=d.data.map(function(c){return c.productId}).join(',');api('/product?ids='+ids).then(function(pd){var pm={};(pd.data&&pd.data.records||[]).forEach(function(p){pm[p.id]=p});var html='';d.data.forEach(function(c){var p=pm[c.productId]||{},name=p.name||'商品#'+c.productId,price=p.price||'?';html+='<tr><td>'+c.productId+'</td><td>'+name+'</td><td>¥'+price+'</td><td><input type="number" min="1" value="'+c.quantity+'" style="width:60px;padding:4px;background:var(--bg);border:1px solid var(--border);color:#fff;border-radius:6px" onchange="updateCartQty('+c.id+',this.value)"></td><td><input type="checkbox" '+(c.checked?'checked':'')+' onchange="toggleCartCheck('+c.id+',this.checked)"></td><td><button class="btn btn-red btn-sm" onclick="delCart('+c.id+')">删除</button></td></tr>'});byId('cartList').innerHTML='<table><thead><tr><th>商品ID</th><th>名称</th><th>单价</th><th>数量</th><th>选中</th><th>操作</th></tr></thead><tbody>'+html+'</tbody></table><div style="text-align:right;margin-top:16px"><button class="btn btn-green" onclick="checkout()">💳 结算下单</button></div>'})})}
function updateCartQty(id,qty){api('/cart/'+id,{method:'PUT',body:JSON.stringify({quantity:parseInt(qty)})}).then(loadCart)}
function toggleCartCheck(id,checked){api('/cart/'+id+'/check',{method:'PUT',body:JSON.stringify({checked:!!checked})}).then(loadCart)}
function checkout(){var checked=CART_DATA.filter(function(c){return c.checked});if(!checked.length)return alert('请先选中商品');openReceiverModal(checked.map(function(c){return{productId:c.productId,quantity:c.quantity}}))}
function openReceiverModal(items){byId('rm_items').value=JSON.stringify(items);byId('rrn').value='';byId('rrp').value='';byId('rra').value='';byId('rm').classList.add('show')}
function placeOrder(){var items;try{items=JSON.parse(byId('rm_items').value)}catch(e){return alert('数据错误')}var o={items:items,receiverName:byId('rrn').value,receiverPhone:byId('rrp').value,receiverAddress:byId('rra').value};if(!o.receiverName||!o.receiverPhone||!o.receiverAddress)return alert('请填写收货信息');api('/order',{method:'POST',body:JSON.stringify(o)}).then(function(r){if(r.code===200){closeModal('rm');alert('下单成功！'+r.data.orderNo);loadCart();loadOrders('')}else alert(r.message)})}
function delCart(id){api('/cart/'+id,{method:'DELETE'}).then(loadCart)}
function callApi(){var m=byId('am').value,u=byId('au').value,opt={method:m};if(m!=='GET')opt.body='{}';api(u,opt).then(function(d){byId('ar').textContent=JSON.stringify(d,null,2)})}

// BIND LOGIN BUTTON — use addEventListener instead of onclick
byId('login-btn').addEventListener('click',doLogin);

// INIT
if(T){api('/product?size=1').then(function(d){if(d.code===200){showAuthedUI(U&&U.username?U.username:'admin');nav('dashboard')}else{T='';U=null;localStorage.removeItem('t');localStorage.removeItem('u');hideAuthedUI();nav('login')}})}else{hideAuthedUI();nav('login');}
</script>
</body>
